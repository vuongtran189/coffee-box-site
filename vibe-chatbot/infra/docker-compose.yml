services:
  mongo:
    image: mongo:7
    container_name: vibe-chatbot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - vibe_chatbot_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: vibe-chatbot-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

volumes:
  vibe_chatbot_mongo_data:

