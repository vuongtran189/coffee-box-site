services:
  - type: web
    name: vibe-chatbot-api
    runtime: docker
    rootDir: vibe-chatbot
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: WIDGET_PUBLIC_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: vibe_chatbot

