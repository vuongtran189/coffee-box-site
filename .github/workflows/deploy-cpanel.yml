name: Deploy To cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT }}
          protocol: ${{ secrets.CPANEL_FTP_PROTOCOL }}
          server-dir: ${{ secrets.CPANEL_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.codex/**
            **/node_modules/**
            **/vibe-chatbot/**
            **/_deploy_cpanel/**
            **/*.zip
            **/PLAN.md
            **/SPEC.md
            **/CLOUDFLARE-PAGES-SETUP.md
            **/CMS-SETUP.md
