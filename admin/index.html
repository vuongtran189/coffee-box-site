<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Coffee — Quản trị</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="./admin.css?v=20260407wp" />
</head>
<body>
  <div class="wp">
    <aside class="wp-sidebar" aria-label="Menu quản trị">
      <div class="wp-sidebar__brand">
        <div class="wp-logo">Vibe Coffee</div>
        <div class="wp-badge">Admin</div>
      </div>

      <nav id="nav" class="wp-nav"></nav>

      <div class="wp-sidebar__foot">
        <button id="btn-settings" class="wp-nav__item" type="button">Cài đặt kết nối</button>
        <div id="conn-pill" class="wp-pill" title="Trạng thái kết nối">Chưa kết nối</div>
      </div>
    </aside>

    <div class="wp-main">
      <header class="wp-topbar">
        <div class="wp-topbar__left">
          <button id="btn-mobile-menu" class="wp-iconbtn" type="button" aria-label="Mở menu">☰</button>
          <div id="page-title" class="wp-title">Dashboard</div>
        </div>
        <div class="wp-topbar__right">
          <div id="save-state" class="wp-muted"></div>
          <button id="btn-save" class="wp-btn wp-btn-primary" type="button">Lưu</button>
        </div>
      </header>

      <main class="wp-content">
        <div id="notice" class="wp-notice" hidden></div>
        <div id="app"></div>
      </main>
    </div>
  </div>

  <div id="settings-modal" class="modal" hidden aria-hidden="true">
    <div class="modal__backdrop" data-close="1" aria-hidden="true"></div>
    <div class="modal__panel card" role="dialog" aria-modal="true" aria-label="Cài đặt admin">
      <div class="row row-between">
        <h1>Cài đặt</h1>
        <button class="btn btn-ghost" type="button" data-close="1" aria-label="Đóng">×</button>
      </div>
      <p class="muted">Thông tin được lưu trên trình duyệt này.</p>
      <label class="field">
        <span>API base (Cloudflare)</span>
        <input id="api-base" type="url" placeholder="https://cms.vibecoffee.vn" />
      </label>
      <label class="field">
        <span>Widget key</span>
        <input id="widget-key" type="text" placeholder="Vibe_widget_..." autocomplete="off" />
      </label>
      <label class="field">
        <span>Admin password</span>
        <input id="admin-password" type="password" placeholder="(không lưu)" autocomplete="current-password" />
      </label>
      <div class="row">
        <button id="btn-save-settings" class="btn btn-primary" type="button">Lưu</button>
        <button id="btn-login" class="btn" type="button">Đăng nhập</button>
        <button id="btn-logout" class="btn btn-ghost" type="button">Đăng xuất</button>
        <div id="login-status" class="muted"></div>
      </div>
      <hr class="wp-hr" />
      <div class="muted">
        <div><b>Lưu ý</b></div>
        <div>- Backend CMS: Cloudflare Pages + KV (không phụ thuộc Render).</div>
        <div>- API yêu cầu header <code>x-widget-key</code> (trùng <code>WIDGET_PUBLIC_KEY</code>).</div>
      </div>
    </div>
  </div>

  <script type="module" src="./admin.js?v=20260407wp"></script>
</body>
</html>
